<!DOCTYPE html>
<html lang="{{ g.lang }}">
<head>
  <meta charset="UTF-8">
  <title>{{ t('nav_title') }} | CONTROL PANEL</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-title">ANT FARM v2.0</div>
    <a href="/" class="nav-link">> {{ t('nav_home') }}</a>
    <a href="/heroes" class="nav-link">> {{ t('nav_heroes') }}</a>
    <a href="/civilizations" class="nav-link">> {{ t('nav_civs') }}</a>
    <a href="/oracle" class="nav-link" style="color: var(--oracle)">> {{ t('nav_oracle') }}</a>
  </div>
  
  <div class="main-content">
    <div class="header-bar">
      <div>
        <span style="color:var(--accent-cyan)">SYS.STATUS:</span> ONLINE
      </div>
      <div>
        <span style="color:var(--text-secondary)">WORLD:</span> 
        {% if world %}{{ world.name }} | UPDATED: {{ world.last_updated }}{% else %}AWAITING DATA{% endif %}
      </div>
    </div>
    
    {% block content %}{% endblock %}
  </div>

  <script src="/static/js/tracking.js"></script>
</body>
</html>
