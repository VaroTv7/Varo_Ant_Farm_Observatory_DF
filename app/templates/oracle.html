{% extends "base.html" %}
{% block content %}

<div class="header-bar">
  <h2 style="color:var(--oracle)">CONEXIÓN: CRONISTA OMNISCIENTE</h2>
  <div style="font-size: 0.8rem; color: var(--text-secondary)">STATUS: LINK ESTABLISHED</div>
</div>

<div class="data-panel" style="height: 500px; display: flex; flex-direction: column; background: var(--bg-main);">
  <div id="chat-window" style="flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
    <!-- Welcome message -->
    <div style="align-self: flex-start; max-width: 80%; background: var(--bg-panel); border: 1px solid var(--oracle); padding: 1rem; border-radius: 4px; box-shadow: 0 0 10px rgba(124, 92, 191, 0.1);">
      {% if world %}
        {{ t('oracle_welcome', name=world.name, civs=world.civilizations|length, heroes=world.heroes|length) | safe }}
      {% else %}
        {{ t('index_empty_title') }}
      {% endif %}
    </div>
  </div>

  <div style="padding: 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 1rem; background: var(--bg-panel);">
    <textarea id="user-input" placeholder="{{ t('oracle_input_placeholder') }}" style="flex:1; background: var(--bg-card); color:var(--text-primary); border: 1px solid var(--border); padding: 0.8rem; height: 50px; resize: none;"></textarea>
    <button id="send-btn" style="background: var(--oracle); color: white; border: none; padding: 0 1.5rem; cursor: pointer; text-transform: uppercase; font-weight: bold;">{{ t('oracle_btn') }}</button>
  </div>
</div>

<script>
// Chat Logic integration
const chatWindow = document.getElementById('chat-window');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

function appendMessage(role, text) {
  const div = document.createElement('div');
  div.style.alignSelf = role === 'user' ? 'flex-end' : 'flex-start';
  div.style.maxWidth = '80%';
  div.style.padding = '1rem';
  div.style.borderRadius = '4px';
  div.style.border = role === 'user' ? '1px solid var(--accent-cyan)' : '1px solid var(--oracle)';
  div.style.background = role === 'user' ? 'var(--bg-card)' : 'var(--bg-panel)';
  div.innerHTML = text.replace(/\n/g, '<br>');
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

sendBtn.onclick = async () => {
  const text = userInput.value.trim();
  if(!text) return;
  userInput.value = '';
  appendMessage('user', text);
  
  const loading = document.createElement('div');
  loading.style.fontSize = '0.8rem';
  loading.style.color = 'var(--text-secondary)';
  loading.innerText = "... {{ t('oracle_loading') }}";
  chatWindow.appendChild(loading);
  
  try {
    const res = await fetch('/api/oracle', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question: text})
    });
    const data = await res.json();
    chatWindow.removeChild(loading);
    if(data.answer) appendMessage('assistant', data.answer);
    else appendMessage('assistant', "ERROR: Conexión perdida.");
  } catch(e) {
    chatWindow.removeChild(loading);
    appendMessage('assistant', "FATAL ERROR: El nexo con el Oráculo ha fallado.");
  }
}

userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});
</script>

{% endblock %}
